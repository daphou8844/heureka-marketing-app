<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heúrēka Marketing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
:root{--gold:#D4AF37;--gold-light:#F5D469;--gold-dark:#A68B20;--black:#0A0A0A;--black-soft:#141414;--black-card:#1A1A1A;--black-border:#2A2A2A;--black-hover:#222222;--text-primary:#F0F0F0;--text-secondary:#9A9A9A;--text-muted:#5A5A5A;--sidebar-width:240px;--topbar-height:64px;--green:#22C55E;--red:#EF4444;--blue:#3B82F6;--orange:#F97316;--radius:10px;--radius-sm:6px;--shadow:0 4px 24px rgba(0,0,0,0.4);--shadow-gold:0 4px 20px rgba(212,175,55,0.15)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--black);color:var(--text-primary);font-size:14px;line-height:1.6;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--black-soft)}::-webkit-scrollbar-thumb{background:var(--black-border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--gold-dark)}
body{display:flex;height:100vh}
.sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--black-soft);border-right:1px solid var(--black-border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:100;transition:transform .3s ease}
.main-content{margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:12px;padding:20px 16px;border-bottom:1px solid var(--black-border)}
.logo-mark{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--black);flex-shrink:0;box-shadow:var(--shadow-gold)}
.logo-text{display:flex;flex-direction:column;line-height:1.2}
.logo-main{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.3px}
.logo-sub{font-size:11px;color:var(--text-secondary);letter-spacing:1px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--text-secondary);text-decoration:none;font-size:13.5px;font-weight:500;transition:all .15s ease;position:relative;cursor:pointer}
.nav-item:hover{background:var(--black-hover);color:var(--text-primary)}
.nav-item.active{background:linear-gradient(135deg,rgba(212,175,55,.15),rgba(212,175,55,.08));color:var(--gold);border:1px solid rgba(212,175,55,.2)}
.nav-item .fa-solid,.nav-item .fa-brands{width:18px;text-align:center;font-size:14px}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.nav-item .badge.hot{background:transparent;font-size:13px}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--black-border);display:flex;align-items:center;gap:10px}
.company-info{flex:1}.company-name{display:block;font-size:12px;font-weight:600;color:var(--text-primary)}.company-city{display:block;font-size:10px;color:var(--text-muted)}
.topbar{height:var(--topbar-height);background:var(--black-soft);border-bottom:1px solid var(--black-border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.topbar-title{flex:1;font-size:16px;font-weight:600;color:var(--text-primary)}
.topbar-right{display:flex;align-items:center;gap:12px}
.sync-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green)}
.user-avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--black);cursor:pointer}
.alert-bar{background:rgba(249,115,22,.1);border-bottom:1px solid rgba(249,115,22,.3);padding:10px 24px;flex-shrink:0}
.alert-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--orange)}
.module-view{flex:1;overflow-y:auto;padding:24px}
.module-view.hidden{display:none}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;color:var(--text-primary)}.page-subtitle{font-size:13px;color:var(--text-secondary);margin-top:2px}
.card{background:var(--black-card);border:1px solid var(--black-border);border-radius:var(--radius);padding:20px;transition:border-color .2s ease}
.card:hover{border-color:rgba(212,175,55,.2)}
.card-gold{border-color:rgba(212,175,55,.3);background:linear-gradient(135deg,rgba(212,175,55,.08),rgba(212,175,55,.03))}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.stat-card{background:var(--black-card);border:1px solid var(--black-border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:8px}
.stat-label{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat-value{font-size:32px;font-weight:800;color:var(--gold);line-height:1}
.stat-sub{font-size:12px;color:var(--text-muted)}
.stat-icon{width:40px;height:40px;background:rgba(212,175,55,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold);margin-bottom:4px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;cursor:pointer;border:none;transition:all .15s ease;text-decoration:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--black)}
.btn-primary:hover{background:linear-gradient(135deg,var(--gold-light),var(--gold));transform:translateY(-1px);box-shadow:var(--shadow-gold)}
.btn-secondary{background:var(--black-hover);color:var(--text-primary);border:1px solid var(--black-border)}
.btn-secondary:hover{background:var(--black-border)}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--black-border)}
.btn-ghost:hover{color:var(--text-primary);border-color:var(--text-muted)}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--black-hover);color:var(--text-secondary);border:1px solid var(--black-border);cursor:pointer;transition:all .15s ease;font-size:14px}
.btn-icon:hover{color:var(--gold);border-color:rgba(212,175,55,.4)}
.btn-sm{padding:6px 12px;font-size:12px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-control{width:100%;background:var(--black-soft);border:1px solid var(--black-border);border-radius:var(--radius-sm);color:var(--text-primary);padding:10px 12px;font-size:14px;outline:none;transition:border-color .15s ease;font-family:inherit}
.form-control:focus{border-color:var(--gold)}.form-control::placeholder{color:var(--text-muted)}
select.form-control{cursor:pointer}textarea.form-control{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.tag-gold{background:rgba(212,175,55,.15);color:var(--gold)}.tag-green{background:rgba(34,197,94,.15);color:var(--green)}.tag-red{background:rgba(239,68,68,.15);color:var(--red)}.tag-blue{background:rgba(59,130,246,.15);color:var(--blue)}.tag-orange{background:rgba(249,115,22,.15);color:var(--orange)}.tag-gray{background:rgba(100,100,100,.15);color:var(--text-secondary)}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--black-border)}
td{padding:12px 14px;font-size:13.5px;border-bottom:1px solid rgba(42,42,42,.5);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}tr:last-child td{border-bottom:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.modal{background:var(--black-card);border:1px solid var(--black-border);border-radius:14px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;position:relative;box-shadow:var(--shadow)}
.modal-close{position:absolute;top:16px;right:16px;background:var(--black-hover);border:1px solid var(--black-border);color:var(--text-secondary);width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;z-index:1}
.modal-close:hover{color:var(--text-primary);border-color:var(--text-muted)}
.modal-header{padding:24px 24px 16px;border-bottom:1px solid var(--black-border)}
.modal-header h2{font-size:18px;font-weight:700;color:var(--text-primary)}.modal-header p{font-size:13px;color:var(--text-secondary);margin-top:4px}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--black-border);display:flex;gap:10px;justify-content:flex-end}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.loading-content{text-align:center;display:flex;flex-direction:column;align-items:center;gap:20px}
.loading-spinner{width:56px;height:56px;border:3px solid var(--black-border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-text{color:var(--text-secondary);font-size:14px;max-width:280px;text-align:center}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:3000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:var(--black-card);border:1px solid var(--black-border);border-radius:var(--radius);padding:12px 18px;font-size:13.5px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);pointer-events:all;animation:slideIn .3s ease;max-width:320px}
.toast-success{border-left:3px solid var(--green)}.toast-error{border-left:3px solid var(--red)}.toast-info{border-left:3px solid var(--gold)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.content-block{background:var(--black-soft);border:1px solid var(--black-border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.content-block-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--black-border);background:rgba(212,175,55,.05)}
.content-block-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--gold)}
.content-block-body{padding:16px}
.content-text{font-size:13.5px;line-height:1.7;color:var(--text-primary);white-space:pre-wrap;word-wrap:break-word}
.upload-zone{border:2px dashed var(--black-border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all .2s ease;color:var(--text-secondary)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--gold);background:rgba(212,175,55,.05);color:var(--gold)}
.upload-zone i{font-size:28px;margin-bottom:10px;display:block}.upload-zone p{font-size:13px}.upload-zone small{font-size:11px;color:var(--text-muted)}
.file-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.file-chip{display:flex;align-items:center;gap:6px;background:var(--black-hover);border:1px solid var(--black-border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text-secondary)}
.file-chip button{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;font-size:11px;line-height:1}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-header{text-align:center;padding:8px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.cal-day{background:var(--black-card);border:1px solid var(--black-border);border-radius:6px;min-height:80px;padding:6px;position:relative;transition:border-color .2s}
.cal-day:hover{border-color:rgba(212,175,55,.3)}.cal-day.other-month{opacity:.3}.cal-day.today{border-color:var(--gold)}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
.cal-day.today .cal-day-num{color:var(--gold)}
.cal-event{font-size:10px;padding:2px 6px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-event-facebook,.cal-event-fb{background:rgba(59,130,246,.2);color:#60A5FA}
.cal-event-tiktok{background:rgba(212,175,55,.2);color:var(--gold)}
.cal-event-blogue,.cal-event-blog{background:rgba(34,197,94,.2);color:var(--green)}
.trend-card{background:var(--black-card);border:1px solid var(--black-border);border-radius:var(--radius);padding:16px;transition:border-color .2s}
.trend-card:hover{border-color:rgba(212,175,55,.3)}
.trend-number{font-size:32px;font-weight:900;color:rgba(212,175,55,.2);line-height:1;margin-bottom:8px}
.trend-title{font-size:15px;font-weight:700;margin-bottom:6px}.trend-desc{font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.progress-bar{width:100%;height:8px;background:var(--black-border);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));border-radius:4px;transition:width .5s ease}
.progress-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px}
.empty-state{text-align:center;padding:60px 24px;color:var(--text-muted)}
.empty-state i{font-size:40px;margin-bottom:16px;display:block;opacity:.4}.empty-state h3{font-size:16px;color:var(--text-secondary);margin-bottom:8px}.empty-state p{font-size:13px;margin-bottom:20px}
.filters-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-input{position:relative;flex:1;min-width:200px}
.search-input i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px}
.search-input input{padding-left:32px}
.notification-pill{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(212,175,55,.1),rgba(212,175,55,.05));border:1px solid rgba(212,175,55,.3);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;cursor:pointer;transition:all .2s}
.notification-pill:hover{border-color:rgba(212,175,55,.6)}
.notification-pill-icon{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--black);flex-shrink:0}
.notification-pill-text{flex:1}.notification-pill-title{font-size:13.5px;font-weight:600;color:var(--gold)}.notification-pill-sub{font-size:12px;color:var(--text-secondary)}
.section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:24px}
.section-title:first-child{margin-top:0}
.btn-copy.copied{color:var(--green);border-color:rgba(34,197,94,.4)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.5)}.main-content{margin-left:0}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}}
@media(max-width:560px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.module-view{padding:16px}}
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">H</div>
      <div class="logo-text">
        <span class="logo-main">Heúrēka</span>
        <span class="logo-sub">Marketing</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-module="dashboard">
        <i class="fa-solid fa-gauge-high"></i><span>Tableau de bord</span>
      </a>
      <a class="nav-item" data-module="generator">
        <i class="fa-solid fa-wand-magic-sparkles"></i><span>Générateur</span>
        <span class="badge" id="badge-generator" style="display:none">!</span>
      </a>
      <a class="nav-item" data-module="calendar">
        <i class="fa-solid fa-calendar-days"></i><span>Calendrier</span>
      </a>
      <a class="nav-item" data-module="trending">
        <i class="fa-brands fa-tiktok"></i><span>TikTok Tendances</span>
        <span class="badge hot">🔥</span>
      </a>
      <a class="nav-item" data-module="content-bank">
        <i class="fa-solid fa-layer-group"></i><span>Banque de contenu</span>
      </a>
      <a class="nav-item" data-module="reviews">
        <i class="fa-solid fa-star"></i><span>Avis Google</span>
      </a>
      <a class="nav-item" data-module="seasonal">
        <i class="fa-solid fa-seedling"></i><span>Contenu saisonnier</span>
      </a>
      <a class="nav-item" data-module="reports">
        <i class="fa-solid fa-chart-line"></i><span>Rapport mensuel</span>
      </a>
      <a class="nav-item" data-module="promotions">
        <i class="fa-solid fa-tags"></i><span>Promotions</span>
      </a>
    </nav>
    <div class="sidebar-footer" style="flex-direction:column;gap:8px;align-items:stretch">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="company-info">
          <span class="company-name">Les Gestions Heúrēka</span>
          <span class="company-city">Saint-Jean-sur-Richelieu</span>
        </div>
        <button class="btn-icon" id="btn-sync" title="Sync Pipeline" onclick="App.syncPipeline()">
          <i class="fa-solid fa-rotate"></i>
        </button>
      </div>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <header class="topbar">
      <button class="btn-icon" id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-title" id="topbar-title">Tableau de bord</div>
      <div class="topbar-right">
        <div class="sync-status"><i class="fa-solid fa-circle-check"></i><span>Synchronisé</span></div>
        <div class="user-avatar">M</div>
      </div>
    </header>
    <div class="alert-bar" id="alert-bar" style="display:none">
      <div class="alerts-container" id="alerts-container"></div>
    </div>
    <div class="module-view" id="view-dashboard"></div>
    <div class="module-view hidden" id="view-generator"></div>
    <div class="module-view hidden" id="view-calendar"></div>
    <div class="module-view hidden" id="view-trending"></div>
    <div class="module-view hidden" id="view-content-bank"></div>
    <div class="module-view hidden" id="view-reviews"></div>
    <div class="module-view hidden" id="view-seasonal"></div>
    <div class="module-view hidden" id="view-reports"></div>
    <div class="module-view hidden" id="view-promotions"></div>
  </main>

  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close"><i class="fa-solid fa-xmark"></i></button>
      <div class="modal-header" id="modal-header"></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>
  <div class="loading-overlay" id="loading-overlay" style="display:none">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p id="loading-text">Génération en cours...</p>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/trending.js"></script>
  <script src="js/content-bank.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/seasonal.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/promotions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
