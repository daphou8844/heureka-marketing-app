<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heúrēka Marketing</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">H</div>
      <div class="logo-text">
        <span class="logo-main">Heúrēka</span>
        <span class="logo-sub">Marketing</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-module="dashboard">
        <i class="fa-solid fa-gauge-high"></i>
        <span>Tableau de bord</span>
      </a>
      <a href="#" class="nav-item" data-module="generator">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>Générateur</span>
        <span class="badge" id="badge-generator" style="display:none">!</span>
      </a>
      <a href="#" class="nav-item" data-module="calendar">
        <i class="fa-solid fa-calendar-days"></i>
        <span>Calendrier</span>
      </a>
      <a href="#" class="nav-item" data-module="trending">
        <i class="fa-brands fa-tiktok"></i>
        <span>TikTok Tendances</span>
        <span class="badge hot">🔥</span>
      </a>
      <a href="#" class="nav-item" data-module="content-bank">
        <i class="fa-solid fa-layer-group"></i>
        <span>Banque de contenu</span>
      </a>
      <a href="#" class="nav-item" data-module="reviews">
        <i class="fa-solid fa-star"></i>
        <span>Avis Google</span>
      </a>
      <a href="#" class="nav-item" data-module="seasonal">
        <i class="fa-solid fa-seedling"></i>
        <span>Contenu saisonnier</span>
      </a>
      <a href="#" class="nav-item" data-module="reports">
        <i class="fa-solid fa-chart-line"></i>
        <span>Rapport mensuel</span>
      </a>
      <a href="#" class="nav-item" data-module="promotions">
        <i class="fa-solid fa-tags"></i>
        <span>Promotions</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="company-info">
        <span class="company-name">Les Gestions Heúrēka</span>
        <span class="company-city">Saint-Jean-sur-Richelieu</span>
      </div>
      <button class="btn-icon" id="btn-sync" title="Synchroniser avec Pipeline" onclick="App.syncPipeline()">
        <i class="fa-solid fa-rotate"></i>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content" id="main-content">
    <!-- Top bar -->
    <header class="topbar">
      <button class="btn-icon sidebar-toggle" id="sidebar-toggle">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="topbar-title" id="topbar-title">Tableau de bord</div>
      <div class="topbar-right">
        <div class="sync-status" id="sync-status">
          <i class="fa-solid fa-circle-check"></i>
          <span>Synchronisé</span>
        </div>
        <div class="user-avatar">M</div>
      </div>
    </header>

    <!-- Alert bar -->
    <div class="alert-bar" id="alert-bar" style="display:none">
      <div class="alerts-container" id="alerts-container"></div>
    </div>

    <!-- Module views -->
    <div class="module-view" id="view-dashboard">
      <!-- Dashboard content injected by dashboard.js -->
    </div>

    <div class="module-view hidden" id="view-generator">
      <!-- Generator content injected by generator.js -->
    </div>

    <div class="module-view hidden" id="view-calendar">
      <!-- Calendar content injected by calendar.js -->
    </div>

    <div class="module-view hidden" id="view-trending">
      <!-- TikTok trending content injected by trending.js -->
    </div>

    <div class="module-view hidden" id="view-content-bank">
      <!-- Content bank injected by content-bank.js -->
    </div>

    <div class="module-view hidden" id="view-reviews">
      <!-- Reviews injected by reviews.js -->
    </div>

    <div class="module-view hidden" id="view-seasonal">
      <!-- Seasonal content injected by seasonal.js -->
    </div>

    <div class="module-view hidden" id="view-reports">
      <!-- Reports injected by reports.js -->
    </div>

    <div class="module-view hidden" id="view-promotions">
      <!-- Promotions injected by promotions.js -->
    </div>
  </main>

  <!-- Global modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close"><i class="fa-solid fa-xmark"></i></button>
      <div class="modal-header" id="modal-header"></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading-overlay" style="display:none">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p id="loading-text">Génération en cours avec Claude IA...</p>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/trending.js"></script>
  <script src="js/content-bank.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/seasonal.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/promotions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
